version: '3.8'

services:
  # ── MongoDB ──
  mongo:
    image: mongo:7.0
    container_name: grocery_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: securepassword
      MONGO_INITDB_DATABASE: grocery_tracker
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - grocery_net

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grocery_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://admin:securepassword@mongo:27017/grocery_tracker?authSource=admin
      JWT_SECRET: change_this_to_a_very_long_random_secret_key_32chars
      JWT_EXPIRE: 7d
      STORE_NAME: Sharma Kirana Store
      STORE_GSTIN: 21AABCU9603R1ZV
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - grocery_net
    volumes:
      - ./backend/logs:/app/logs

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grocery_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - grocery_net

volumes:
  mongo_data:

networks:
  grocery_net:
    driver: bridge
